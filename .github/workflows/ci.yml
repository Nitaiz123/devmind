name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install fastapi uvicorn pydantic openai httpx pytest pytest-asyncio

      - name: Run tests
        run: pytest tests/ -v --tb=short

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install ruff
        run: pip install ruff
      - name: Lint
        run: ruff check devmind/ --ignore E501,E402 || true

  demo:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: pip install fastapi uvicorn pydantic openai httpx
      - name: Run demo (smoke test)
        run: python -c "
import sys
sys.path.insert(0, '.')
from devmind import Tracer, MockEngine

def buggy():
    balance = 100
    balance -= 200
    return balance

with Tracer(label='ci_test', record_lines=True) as t:
    buggy()

engine = MockEngine()
answer = engine.analyze_trace(t.session)
assert len(answer.root_causes) > 0, 'Expected root causes'
print('Demo smoke test passed:', answer.answer[:80])
"
